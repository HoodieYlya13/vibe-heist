name: CI

on:
  push:
    paths:
      - "sim/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "sim/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  sim:
    name: Sim (Rust) — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sim

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests (native, includes vehicle replay tests)
        run: cargo test
